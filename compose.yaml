services:
  db:
    image: postgres:16
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
    - ./db/words.sql:/docker-entrypoint-initdb.d/words.sql:ro
  words:
    build: ./words
    depends_on:
      - db

  narrative:
    build: ./narrative
    depends_on:
      - db
      - words
    environment:
      WORDS_BASE_URL: http://words:8080
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ""
      LLM_BASE_URL: http://model-runner.docker.internal/engines/v1
      LLM_MODEL_NAME: ai/smollm2

  web2:
    build: ./web2
    depends_on:
      - words
      - narrative
    environment:
      HOST: 0.0.0.0
      PORT: "8000"
      WORDS_PORT: "8080"
      NARRATIVE_HOST: narrative
      NARRATIVE_PORT: "8181"
    ports:
      - "8080:8000"